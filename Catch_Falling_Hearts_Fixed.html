<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Us ♡</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500&family=Pacifico&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#FFC5D3">

<link rel="icon" href="icons/icon-192.png">

<style>
body{margin:0;overflow:hidden;background:#FFC5D3;font-family:Quicksand}

/* TOP BAR */
.top-bar{
    position:fixed;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:12px;
    z-index:9999;
}

#homeBtn{
    text-decoration:none;
    background:rgba(255,255,255,0.7);
    backdrop-filter: blur(5px);
    padding:8px 14px;
    border-radius:20px;
    color:#ff4f8b;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
    transition:0.2s;
}

#homeBtn:hover{transform:scale(1.05);background:white}

.music-btn{
    background:white;
    border:none;
    padding:8px 12px;
    border-radius:14px;
    color:#ff4f8b;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* SCORE UI */
#score,#high{
    position:fixed;
    top:15px;
    background:rgba(255,255,255,0.7);
    backdrop-filter: blur(5px);
    padding:12px 18px;
    border-radius:18px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}
#score{left:15px}
#high{right:15px}

h3{margin:0;font-family:Pacifico;color:#ff4f8b}

#heart,#basket{position:absolute}
#heart{width:48px}
#basket{width:140px;bottom:20px}

/* OVERLAY */
#overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(255, 192, 203, 0.35);
    backdrop-filter: blur(6px);
    align-items:center;
    justify-content:center;
    z-index:1000;
}

#box{
    background:linear-gradient(145deg, #fff, #ffe6ef);
    padding:30px 28px;
    border-radius:25px;
    text-align:center;
    width:260px;
    border:2px solid #ffd1e1;
}

#box h2{
    font-family:Pacifico;
    color:#ff4f8b;
}

#n{
    padding:10px;
    border-radius:12px;
    border:1px solid #ffb6c9;
    width:80%;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
    <a href="index.html" id="homeBtn">← Back Home</a>
    <button class="music-btn" onclick="toggleMusic()">🎵 Play / Pause</button>
</div>

<!-- MUSIC -->
<audio id="bg" loop>
    <source src="Song5.mp3">
</audio>

<div id="score"><h3>Score</h3><div id="s">0</div></div>
<div id="high"><h3>Best</h3><div id="b"></div></div>

<img id="heart" src="heart.png">
<img id="basket" src="basket.png">

<div id="overlay">
    <div id="box">
        <h2>Game Over</h2>
        <p>Score: <span id="f"></span></p>
        <div id="nwrap" style="display:none">
            <input id="n" placeholder="Your name">
        </div>
        <br>
        <button id="btn">Play Again</button>
    </div>
</div>

<script>
const bg = document.getElementById('bg');
bg.volume = 1.0;

/* MUSIC */
function toggleMusic(){
    if(bg.paused){
        bg.play().catch(()=>{});
    }else{
        bg.pause();
    }
}

/* FIXED AUTOPLAY UNLOCK */
document.body.addEventListener('click', () => {
    bg.play().catch(()=>{});
}, { once: true });

const heart=document.getElementById('heart'),
basket=document.getElementById('basket'),
S=document.getElementById('s'),
B=document.getElementById('b');

let best=JSON.parse(localStorage.getItem('heartBest')||'{"name":"Nobody","score":0}');
B.textContent=best.name+" - "+best.score;

let bx=innerWidth/2-70,hx=100,hy=-50,score=0,speed=3,over=false;
basket.style.left=bx+'px';

function spawn(){
    hx=Math.random()*(innerWidth-60);
    hy=-60;
    heart.style.left=hx+'px';
}

spawn();

addEventListener('mousemove',e=>bx=e.clientX-70);

addEventListener('keydown',e=>{
    if(e.key==='ArrowLeft')bx-=35;
    if(e.key==='ArrowRight')bx+=35;
});

function tick(){
 if(over)return;

 bx=Math.max(0,Math.min(innerWidth-140,bx));
 basket.style.left=bx+'px';

 hy+=speed;
 heart.style.top=hy+'px';

 const basketTop=innerHeight-20-basket.height;

 if(hy+heart.height>=basketTop){
   if(hx+heart.width>bx && hx<bx+basket.width){
      score++;
      S.textContent=score;
      speed+=0.2;
      spawn();
   }else{
      over=true;
      f.textContent=score;
      if(score>best.score)nwrap.style.display='block';
      overlay.style.display='flex';
   }
 }

 requestAnimationFrame(tick);
}

btn.onclick=()=>{
 if(score>best.score){
   const nm=n.value.trim()||"Anonymous";
   localStorage.setItem('heartBest',JSON.stringify({name:nm,score}));
 }
 location.reload();
};

tick();
</script>

</body>

<!-- SERVICE WORKER (correct placement) -->
<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js")
    .then(() => console.log("PWA Ready 💖"));
}
</script>

</html>
