<!DOCTYPE html>
<html>
<head>
    <title>Us ♡</title>

    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500&family=Pacifico&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#FFC5D3">
    <link rel="icon" href="icons/icon-192.png">

    <style>
        body{
            background-color:#FFC5D3;
            margin:0;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            overflow:hidden;
            font-family:"Quicksand", sans-serif;
        }

        .container{
            text-align:center;
        }

        img{
            width:260px;
            animation: float 3s ease-in-out infinite;
        }

        h1{
            margin-top:20px;
            font-family:"Pacifico", cursive;
            color:#ff4f8b;
            font-size:48px;
            text-shadow:1px 1px 2px rgba(255,255,255,0.6);
            margin-bottom:10px;
        }

        .card{
            margin-top:25px;
            background:rgba(255,255,255,0.88);
            padding:30px 45px;
            border-radius:25px;
            box-shadow:0 8px 20px rgba(255,105,135,0.25);
            border:2px solid #ffd1dc;
        }

        .days{
            font-family:"Pacifico", cursive;
            color:#ff4f8b;
            font-size:70px;
            margin:10px 0;
        }

        .text{
            color:#ff6b98;
            font-size:22px;
            font-weight:500;
        }

        .time{
            margin-top:20px;
            font-size:22px;
            color:#ff7ea8;
        }

        .since{
            margin-top:15px;
            font-size:18px;
            color:#ff6b98;
            font-style:italic;
        }

        .love{
            margin-top:25px;
            font-family:"Pacifico", cursive;
            color:#ff4f8b;
            font-size:30px;
        }

        .back{
            display:inline-block;
            margin-top:30px;
            text-decoration:none;
            color:#ff4f8b;
            background:white;
            padding:12px 24px;
            border-radius:18px;
            font-weight:bold;
            transition:.25s;
            box-shadow:0 5px 12px rgba(255,105,135,.2);
        }

        .back:hover{
            transform:scale(1.05);
            background:#ffe8ef;
        }

        @keyframes float{
            0%,100%{ transform:translateY(0); }
            50%{ transform:translateY(-10px); }
        }

        /* 🎵 MUSIC BUTTON */
        .music-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            background: white;
            border: none;
            padding: 8px 12px;
            border-radius: 12px;
            font-family: "Quicksand", sans-serif;
            color: #ff4f8b;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 105, 135, 0.25);
            z-index: 999;
        }
    </style>
</head>

<body>

    <!-- 🎵 Music -->
    <audio id="bgMusic" loop>
        <source src="Song4.mp3" type="audio/mpeg">
    </audio>

    <!-- 🎵 Button -->
    <button class="music-btn" onclick="toggleMusic()">🎵 Play / Pause</button>

    <div class="container">

        <img src="pink-heart.png" alt="Pink Heart">

        <h1>Our Love Story ♡</h1>

        <div class="card">

            <div class="text">We've been together for</div>

            <div class="days" id="days">0 Days</div>

            <div class="time" id="time">0 Hours • 0 Minutes • 0 Seconds</div>

            <div class="since">Since July 15, 2024 ♡</div>

        </div>

        <div class="love">
            Every second with you is my favorite. 💖
        </div>

        <a class="back" href="index.html">← Back Home</a>

    </div>

<script>
    const startDate = new Date(2024, 6, 15, 0, 0, 0);

    function updateCounter(){
        const now = new Date();
        const diff = now - startDate;

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((diff % (1000 * 60)) / 1000);

        document.getElementById("days").innerHTML = days + " Days";
        document.getElementById("time").innerHTML =
            hours + " Hours • " +
            minutes + " Minutes • " +
            seconds + " Seconds";
    }

    updateCounter();
    setInterval(updateCounter, 1000);

    /* 🎵 MUSIC */
    const music = document.getElementById("bgMusic");
    music.volume = 1.0;

    function toggleMusic() {
        if (music.paused) {
            music.play().catch(()=>{});
        } else {
            music.pause();
        }
    }

    document.body.addEventListener("click", () => {
        music.play().catch(()=>{});
    }, { once: true });
</script>

<!-- ⚙️ Service Worker -->
<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js")
    .then(() => console.log("PWA Ready 💖"));
}
</script>

</body>
</html>
